[tool.ruff]
target-version = "py312"
line-length = 88

[tool.ruff.lint]
select = ["E", "F", "W", "I", "UP", "B", "SIM", "ASYNC"]
ignore = ["E501"]

[tool.ruff.lint.isort]
known-first-party = ["custom_components.concept2_logbook"]

[tool.pytest.ini_options]
testpaths = ["tests"]
asyncio_mode = "auto"
# Without this, `custom_components` is only importable when invoked as
# `python -m pytest` (which adds cwd to sys.path as a side effect of `-m`).
# Plain `pytest` — what CI actually runs — does not, and fails with
# ModuleNotFoundError. Explicit > implicit: this makes repo root importable
# regardless of invocation style.
pythonpath = ["."]
