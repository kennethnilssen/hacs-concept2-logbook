[tool.ruff]
target-version = "py312"
line-length = 88

[tool.ruff.lint]
select = ["E", "F", "W", "I", "UP", "B", "SIM", "ASYNC"]
ignore = ["E501"]

[tool.ruff.lint.isort]
known-first-party = ["custom_components.concept2_logbook"]

[tool.pytest.ini_options]
testpaths = ["tests"]
asyncio_mode = "auto"
