name: HACS validation

on:
  push:
    branches: [main]
  pull_request:
  schedule:
    - cron: "0 0 * * *"

permissions:
  contents: read

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: hacs/action@main
        with:
          category: integration
          # We don't rely on the PR-comment feature (no external PR-based
          # workflow yet), so explicitly turn it off rather than grant
          # pull-requests: write just to keep an unused nice-to-have.
          comment: false
