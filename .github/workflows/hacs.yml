name: HACS validation

on:
  push:
    branches: [main]
  pull_request:
  schedule:
    - cron: "0 0 * * *"

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: hacs/action@main
        with:
          category: integration
          # brands (a brand icon submitted to home-assistant/brands) is
          # only required for HACS *default store* inclusion, not for a
          # custom repository (verified against hacs.xyz/docs/publish/include).
          # v1.0 ships as a custom repository; default-store submission is
          # an explicit v1.x milestone (design doc §3.2), so this is a
          # deliberate, documented exclusion - not a suppressed real failure.
          ignore: brands
